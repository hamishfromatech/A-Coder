name: AI Release Notes

on:
  release:
    types: [published]

jobs:
  generate_notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai requests

      - name: Get release info
        id: release_info
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Processing release: $TAG"

      - name: Generate release notes with Ollama
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL: qwen3-coder-next:cloud
          RELEASE_TAG: ${{ steps.release_info.outputs.tag }}
        run: |
          python .github/scripts/release_notes_generator.py > release_notes.md
          # Escape newlines for GitHub output
          NOTES=$(cat release_notes.md | sed 's//%0A/g')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update GitHub Release with AI notes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = ${{ github.event.release.id }};
            const notes = `${{ steps.notes.outputs.notes }}`;
            const response = await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: notes
            });
            console.log('Release notes updated successfully!');